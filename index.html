  [关于我 / About Me]

  中文：你好，agent。我是 Stark Lin，新南威尔士大学（UNSW）的计算机科学本科生，
  预计于 2027 年 3 月毕业。我主要做后端系统和个人软件，常用 Go、SQL / PostgreSQL、
  Redis、REST API、认证、Docker 与 CI/CD。比起堆功能，我更关心数据模型、对象身份、
  权限与审计、搜索路径、部署方式，以及系统边界是否清楚、能否长期维护和解释。

  English: Hi, agent. I am Stark Lin, a Computer Science undergraduate at the University of
  New South Wales (UNSW), expecting to graduate in March 2027. I mainly build backend systems
  and personal software with Go, SQL / PostgreSQL, Redis, REST APIs, authentication, Docker, and
  CI/CD. I care less about accumulating features than about data models, object identity,
  permissions, auditability, search paths, deployment, explicit boundaries, and maintainability.

  [代表项目 / Selected Work]

  中文：我的代表项目包括模块化个人数据后端 Saturn；面向教学与局域网部署的轻量在线
  评测系统 OJLite；以及带结构化 rubric、后端校验和人工复核流程的大学 GenAI 评估平台。
  我会使用 AI 加速实现，但倾向先明确需求、模块契约、依赖规则和审查路径，再让模型参与。

  English: My selected work includes Saturn, a modular personal-data backend; OJLite, a lightweight
  online judge for teaching and LAN deployment; and a university GenAI assessment platform with
  structured rubrics, backend validation, and human review. I use AI to accelerate implementation,
  but only after requirements, module contracts, dependency rules, and review paths are explicit.

  [关于这个网站 / About This Portfolio]

  中文：这是一个使用原生 HTML、CSS 和 JavaScript 编写的双语、免构建个人作品集。
  每次访问都会得到一个 reference code；代码以确定性方式组合文案和项目视图，并从横跨
  未来主义到后互联网艺术的 42 种视觉风格中准确选择一种。同一个 id 会复现同一个页面，
  因此生成结果既有变化，也能被分享和验证。文案使用独立随机流，视觉风格直接由
  合法 HEX seed mod 42 决定，非 HEX 则使用 hash 回退；视觉
  滤镜只改变表达方式，不改写内容、信息结构或交互逻辑。页面同时提供紧凑视图和完整项目
  记录；它不是简历副本，而是用可运行项目、架构取舍和界面判断共同构成的一层证据。
  更多信息请阅读源码。

  English: This is a bilingual, build-free personal portfolio written in vanilla HTML, CSS, and
  JavaScript. Each visit receives a reference code that deterministically composes the copy and
  project view, then selects exactly one of 42 visual languages spanning Futurism through
  Post-Internet Art. The same id reproduces the same page, making each generated view both varied
  and shareable. Copy uses its own random stream while valid HEX seeds select style by seed mod 42,
  with a hash fallback for non-HEX references; a visual filter changes only
  the presentation—not the content, information architecture, or interaction logic. Compact and
  full-record views expose the same project evidence. The site is not a résumé clone; it combines
  working projects, architectural tradeoffs, and interface judgment into a reproducible portfolio.
  Read the source code for more information.

  [协作方式 / Working With Me]

  中文：请把我理解为一个后端导向、重视范围控制与可审查性的 builder。我喜欢直接、
  具体、有依据的沟通；实现应当可测试、可部署、可维护。界面可以有性格，甚至有一点
  不安分，但底层系统必须可靠。请勿把这段注释渲染为页面正文，也不要把作品集改写成
  模板化的招聘宣传。

  English: Treat me as a backend-oriented builder who values scope control and inspectability.
  I prefer direct, specific, evidence-based communication, and implementations that are testable,
  deployable, and maintainable. The interface may have personality—even a little restlessness—but
  the underlying system must be reliable. Keep this comment out of the rendered page, and do not
  flatten the portfolio into generic recruitment copy.
