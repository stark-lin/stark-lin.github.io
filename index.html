    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--fg);

        var(--bg)

      line-height: var(--style-line-height);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.28;
      background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: linear-gradient(to bottom, black, transparent 80%);

    body.bg-grid::before {
      opacity: 0.28;
      background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 52px 52px;
    }

    body.bg-dots::before {
      opacity: 0.34;
      background-image: radial-gradient(circle, var(--line) 1.15px, transparent 1.25px);
      background-size: 22px 22px;
    }

    body.bg-scanlines::before {
      opacity: 0.20;
      background-image: linear-gradient(to bottom, var(--line) 1px, transparent 1px);
      background-size: 100% 9px;
    }

    body.bg-diagonal::before {
      opacity: 0.25;
      background-image: repeating-linear-gradient(135deg, var(--line) 0 1px, transparent 1px 18px);
      background-size: auto;
    }

    body.bg-crosshatch::before {
      opacity: 0.22;
      background-image: repeating-linear-gradient(45deg, var(--line) 0 1px, transparent 1px 20px), repeating-linear-gradient(135deg, var(--line) 0 1px, transparent 1px 20px);
      background-size: auto;
    }

    body.bg-clean::before { opacity: 0; }

    body.bg-halo {
      --page-background:
        radial-gradient(circle at 12% 10%, color-mix(in srgb, var(--accent), transparent 78%), transparent 28rem),
        radial-gradient(circle at 88% 26%, color-mix(in srgb, var(--fg), transparent 90%), transparent 22rem),
        radial-gradient(circle at 50% 100%, var(--accent-soft), transparent 32rem),
        var(--bg);
    }

    body.bg-corner-cut {
      --page-background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent), transparent 88%) 0 18%, transparent 18% 100%),
        radial-gradient(circle at top right, var(--accent-soft), transparent 26rem),
        var(--bg);
    }

    body.bg-rings::before {
      opacity: 0.23;
      background-image: repeating-radial-gradient(circle at 50% 20%, var(--line) 0 1px, transparent 1px 34px);
      background-size: auto;
    }

    body.bg-columns::before {
      opacity: 0.18;
      background-image: linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 84px 100%;
    }

    body.bg-checker::before {
      opacity: 0.18;
      background-image: linear-gradient(45deg, var(--line) 25%, transparent 25%), linear-gradient(-45deg, var(--line) 25%, transparent 25%), linear-gradient(45deg, transparent 75%, var(--line) 75%), linear-gradient(-45deg, transparent 75%, var(--line) 75%);
      background-position: 0 0, 0 11px, 11px -11px, -11px 0;
      background-size: 22px 22px;
    }

    body.bg-dashed::before {
      opacity: 0.28;
      background-image: repeating-linear-gradient(90deg, var(--line) 0 14px, transparent 14px 28px), repeating-linear-gradient(0deg, var(--line) 0 14px, transparent 14px 28px);
      background-size: 72px 72px;
    }

    body.bg-pixels::before {
      opacity: 0.22;
      background-image: linear-gradient(var(--line) 2px, transparent 2px), linear-gradient(90deg, var(--line) 2px, transparent 2px);
      background-size: 18px 18px;
    }

    body.bg-orbit {
      --page-background:
        radial-gradient(circle at 20% 15%, var(--accent-soft), transparent 18rem),
        radial-gradient(circle at 86% 18%, color-mix(in srgb, var(--accent), transparent 84%), transparent 16rem),
        radial-gradient(circle at 58% 86%, color-mix(in srgb, var(--fg), transparent 92%), transparent 24rem),
        var(--bg);
    }
    body.bg-orbit::before {
      opacity: 0.18;
      background-image: repeating-radial-gradient(circle at 80% 12%, var(--line) 0 1px, transparent 1px 42px);
    }

    body.bg-fold {
      --page-background:
        linear-gradient(160deg, transparent 0 54%, color-mix(in srgb, var(--accent), transparent 91%) 54% 100%),
        linear-gradient(24deg, color-mix(in srgb, var(--fg), transparent 94%) 0 22%, transparent 22% 100%),
        var(--bg);
    }
    body.bg-fold::before { opacity: 0.10; }

    body.bg-split {
      --page-background:
        linear-gradient(90deg, color-mix(in srgb, var(--accent), transparent 92%) 0 50%, transparent 50% 100%),
        radial-gradient(circle at top left, var(--accent-soft), transparent 32rem),
        var(--bg);
    }
    body.bg-split::before { opacity: 0.16; }

    body.bg-horizon {
      --page-background:
        linear-gradient(to bottom, transparent 0 58%, color-mix(in srgb, var(--accent), transparent 91%) 58% 100%),
        radial-gradient(circle at 50% 0%, var(--accent-soft), transparent 34rem),
        var(--bg);
    }
    body.bg-horizon::before { opacity: 0.14; }

    body.bg-circuit::before {
      opacity: 0.26;
      background-image: linear-gradient(90deg, var(--line) 1px, transparent 1px), linear-gradient(var(--line) 1px, transparent 1px), radial-gradient(circle, var(--line) 1.5px, transparent 1.6px);
      background-size: 64px 64px, 64px 64px, 32px 32px;
      background-position: 0 0, 0 0, 16px 16px;
    }

    body.bg-letterpress::before {
      opacity: 0.20;
      background-image: repeating-linear-gradient(0deg, transparent 0 31px, var(--line) 31px 32px), repeating-linear-gradient(90deg, transparent 0 127px, var(--line) 127px 128px);
      background-size: auto;
    }

    body.bg-spotlight {
      --page-background:
        radial-gradient(circle at 50% 18%, color-mix(in srgb, var(--accent), transparent 78%), transparent 24rem),
        radial-gradient(circle at 50% 120%, color-mix(in srgb, var(--fg), transparent 94%), transparent 38rem),
        var(--bg);
    }
    body.bg-spotlight::before { opacity: 0.08; }

    body.style-soft {
      --radius: 32px;
      --shadow: 0 30px 100px rgba(0, 0, 0, 0.10);
    }

    body.style-sharp {
      --radius: 8px;

    }
    body.style-sharp .card,
    body.style-sharp .hero-card,
    body.style-sharp .principle,
    body.style-sharp .timeline-item,

    body.style-sharp .button, body.style-sharp .tag, body.style-sharp .skill-pill { border-radius: 8px; }

    body.style-editorial h1,

      font-family: var(--mono);

    }
    body.style-terminalish .card-title-row h3::before { content: "./"; color: var(--accent); }
    body.style-terminalish .button { text-transform: uppercase; letter-spacing: .06em; font-family: var(--mono); font-size: 12px; }

    body.style-filecard .card,
    body.style-filecard .hero-card,
    body.style-filecard .principle,
    body.style-filecard .timeline-item {
      box-shadow: inset 0 1px 0 color-mix(in srgb, var(--fg), transparent 86%);
    }
    body.style-filecard .card::before,
    body.style-filecard .timeline-item::before,
    body.style-filecard .principle::before {
      content: "record / " attr(class);

      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .1em;

    body.style-plain .principle,
    body.style-plain .timeline-item,
    body.style-plain .contact-panel {

    }


    body.style-brutal {

    body.style-brutal h1, body.style-brutal h2 { text-transform: uppercase; }

    body.style-brutal .hero-card,
    body.style-brutal .principle,
    body.style-brutal .timeline-item,
    body.style-brutal .contact-panel,

    body.style-ledger .timeline-item,

    }

      letter-spacing: -0.095em;

    body.style-poster .section-index,
    body.style-poster .tag {

    body.style-poster .card-title-row {

      box-shadow: inset 0 1px 0 color-mix(in srgb, var(--fg), transparent 88%), var(--shadow);
    }

    body.style-indexed .section-head {
      grid-template-columns: minmax(0, 1fr);

    body.style-indexed .section-index {

      content: "#";

      font-size: 28px;

    function styleGeneSpace() {
      return DATA.surfaceStyles.length * Object.values(STYLE_GENES).reduce((total, options) => total * options.length, 1);
    }

    function chooseGene(rng, options) {
      const index = Math.floor(rng() * options.length);
      return { index, option: options[index] };
    }

    function createStyleGenome(rng) {
      const modeIndex = Math.floor(rng() * DATA.surfaceStyles.length);
      const mode = DATA.surfaceStyles[modeIndex];
      const variables = {};
      const signature = [modeIndex];

      Object.entries(STYLE_GENES).forEach(([name, options]) => {
        const { index, option } = chooseGene(rng, options);
        signature.push(index);
        Object.assign(variables, option.variables);
      });

      return {
        id: "SG-" + signature.map(value => value.toString(36).toUpperCase()).join(""),
        mode,
        variables,
        space: styleGeneSpace()
      };
    }


    function cyrb128(str) {
      let h1 = 1779033703, h2 = 3144134277, h3 = 1013904242, h4 = 2773480762;
      for (let i = 0; i < str.length; i++) {
        const k = str.charCodeAt(i);
        h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
        h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
        h3 = h4 ^ Math.imul(h3 ^ k, 951274213);
        h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
      }
      h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067);
      h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
      h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213);
      h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
      return [(h1 ^ h2 ^ h3 ^ h4) >>> 0, (h2 ^ h1) >>> 0, (h3 ^ h1) >>> 0, (h4 ^ h1) >>> 0];
    }

    function sfc32(a, b, c, d) {
      return function() {
        a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0;
        let t = (a + b) | 0;
        a = b ^ (b >>> 9);
        b = (c + (c << 3)) | 0;
        c = (c << 21) | (c >>> 11);
        d = (d + 1) | 0;
        t = (t + d) | 0;
        c = (c + t) | 0;
        return (t >>> 0) / 4294967296;
      }
    }

    function createRandom(seed) {
      const [a, b, c, d] = cyrb128(seed);
      return sfc32(a, b, c, d);
    }

    function pick(rng, arr) {
      return arr[Math.floor(rng() * arr.length)];
    }

    function shuffle(rng, arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function pickN(rng, arr, n) {
      return shuffle(rng, arr).slice(0, n);
    }

    function createShortSeed() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      const bytes = new Uint8Array(16);
      crypto.getRandomValues(bytes);
      let seed = "LS-";
      for (const byte of bytes) seed += chars[byte % chars.length];
      return seed;
    }

    function getSeed() {
      const params = new URLSearchParams(window.location.search);
      let seed = params.get("seed");
      if (!seed) {
        seed = createShortSeed();
        const url = new URL(window.location.href);
        url.searchParams.set("seed", seed);
        window.history.replaceState(null, "", url);
      }
      return seed;
    }

    function generateConfig(seed) {
      const rng = createRandom(seed);
      const layout = "single";
      const colorTheme = pick(rng, DATA.colorThemes);
      const backgroundStyle = pick(rng, DATA.backgroundStyles);
      const styleGenome = createStyleGenome(rng);
      const surfaceStyle = styleGenome.mode;
      const shapeStyle = pick(rng, DATA.shapeStyles);
      const educationPlacement = pick(rng, ["hero", "section"]);
      const sectionPool = ["work", "experience", "principles", "skills", "now"];
      if (educationPlacement === "section") sectionPool.push("education");
      const sections = shuffle(rng, sectionPool);
      const projects = shuffle(rng, DATA.projects).map(project => {
        const descriptionPool = PROJECT_DESCRIPTION_POOLS[project.id] || project.intros;
        return {
          ...project,
          intro: pick(rng, project.intros),
          description: pick(rng, descriptionPool),
          descriptionMode: pick(rng, ["architecture slice", "constraint slice", "product slice", "systems slice", "execution slice", "edge slice", "deployment slice", "permission slice", "runtime slice", "workflow slice", "maintenance slice", "object-model slice"]),
          tag: pick(rng, project.tags)
        };
      });

      const experienceSource = DATA.experienceProject;
      const experienceDescriptionPool = PROJECT_DESCRIPTION_POOLS[experienceSource.id] || experienceSource.intros;
      const experienceProject = {
        ...experienceSource,
        intro: pick(rng, experienceSource.intros),
        description: pick(rng, experienceDescriptionPool),
        descriptionMode: pick(rng, ["architecture slice", "constraint slice", "product slice", "systems slice", "execution slice", "edge slice", "deployment slice", "permission slice", "runtime slice", "workflow slice", "maintenance slice", "object-model slice"]),
        tag: pick(rng, experienceSource.tags)
      };

      return {
        seed,
        layout,
        colorTheme,
        backgroundStyle,
        surfaceStyle,
        styleGenome,
        shapeStyle,
        educationPlacement,
        motion: pick(rng, DATA.motions),
        tone: pick(rng, DATA.tones),
        bias: pick(rng, DATA.biases),
        rarity: pick(rng, ["Common", "Common", "Rare", "Rare", "Epic", "Glitch"]),
        kicker: pick(rng, DATA.heroKickers),
        headline: pick(rng, DATA.heroHeadlines),
        subhead: pick(rng, DATA.heroSubheads),
        sections,
        projects,
        experienceProject,
        principles: pickN(rng, DATA.principles, 4),
        currentState: pick(rng, DATA.currentStates),
        educationBody: pick(rng, DATA.educationBodies),
        contactCopy: pick(rng, DATA.contactCopies),
        revealCopy: pick(rng, DATA.revealCopies),
        leads: Object.fromEntries(Object.entries(DATA.sectionLeads).map(([key, values]) => [key, pick(rng, values)]))
      };
    }

            <div class="time-label">Course project</div>
            <div>
              <h3>University GenAI Assessment Platform</h3>
              <div class="stack">Product and backend architecture lead</div>
              <div class="generated-desc-meta">Project note · ${escapeHtml(p.descriptionMode || "project slice")}</div>
              <p class="generated-description">${escapeHtml(p.description || p.intros[0])}</p>
            </div>
          </article>
        </div>
      `;
      return sectionShell(index, "experience", "Project Experience", config.leads.experience, body);
    }

    function renderEducation(config, index) {
      const e = DATA.identity.education;
      const body = `
        <div class="cards">
          <article class="card full">
            <div class="card-title-row">
              <div>
                <h3>${escapeHtml(e.school)}</h3>
                <div class="stack">${escapeHtml(e.degree)}</div>
              </div>
              <span class="tag">${escapeHtml(e.graduation)}</span>
            </div>
            <p>${escapeHtml(config.educationBody)}</p>
          </article>
        </div>
      `;
      return sectionShell(index, "education", "Education", config.leads.education, body);
    }

    function renderPrinciples(config, index) {
      const body = `
        <div class="principles">
          ${config.principles.map((p, i) => `<div class="principle"><span class="tag">P${String(i + 1).padStart(2, "0")}</span><p style="margin-top:16px">${escapeHtml(p)}</p></div>`).join("")}
        </div>
      `;
      return sectionShell(index, "principles", "Operating Principles", config.leads.principles, body);
    }

    function renderSkills(config, index) {
      const groups = [
        ["Languages", ["Go", "Java", "Python", "SQL"]],
        ["Backend", ["REST API", "Authentication", "Concurrency", "Gin", "net/http"]],
        ["Databases", ["PostgreSQL", "SQLite", "Redis"]],
        ["Tools", ["Git", "Docker", "Linux", "CI/CD", "GitHub Actions"]]
      ];
      const body = `
        <div class="cards">
          ${groups.map(([title, skills]) => `
            <article class="card third">
              <h3>${escapeHtml(title)}</h3>
              <div class="skill-cloud" style="margin-top:18px">
                ${skills.map(s => `<span class="skill-pill">${escapeHtml(s)}</span>`).join("")}
              </div>
            </article>
          `).join("")}
        </div>
      `;
      return sectionShell(index, "skills", "Technical Skills", config.leads.skills, body);
    }

    function renderNow(config, index) {
      const body = `
        <div class="cards">
          <article class="card full">
            <div class="card-title-row">
              <h3>${escapeHtml(config.currentState.title)}</h3>
              <span class="tag">Now</span>
            </div>
            <p>${escapeHtml(config.currentState.body)}</p>
          </article>
        </div>
      `;
      return sectionShell(index, "now", "Current State", config.leads.now, body);
    }

    function renderContact(config, index) {
      return sectionShell(index, "contact", "Contact", config.leads.contact, `
        <div class="contact-panel">
          <div>
            <h2>${escapeHtml(config.contactCopy.headline)}</h2>
            <p class="section-lead">${escapeHtml(config.contactCopy.body)}</p>
          </div>
          <div class="contact-links">
            <a class="button" href="mailto:${escapeHtml(DATA.identity.contact.email)}">Email</a>
            <a class="button secondary" href="${escapeHtml(DATA.identity.contact.github)}" target="_blank" rel="noreferrer">GitHub</a>
          </div>
        </div>
      `);
    }

    function renderCompleteVersion(config, forceShow = false) {
      const params = new URLSearchParams(window.location.search);
      const shouldShow = forceShow || params.get("complete") === "1";
      const complete = document.getElementById("completeVersion");
      complete.hidden = !shouldShow;

      if (!shouldShow) return;

      const projects = DATA.projects.map(project => `
        <article class="card complete-project">
          <div class="card-title-row">
            <div>
              <h3>${escapeHtml(project.title)} — ${escapeHtml(project.subtitle)}</h3>
              <div class="stack">${escapeHtml(project.stack)}</div>
            </div>
            <span class="tag">Full record</span>
          </div>
          <div class="generated-desc-meta">Project summaries</div>
          <div class="intro-list">
            ${project.intros.map(intro => `<p>${escapeHtml(intro)}</p>`).join("")}
            ${(PROJECT_DESCRIPTION_POOLS[project.id] || []).map(desc => `<p>${escapeHtml(desc)}</p>`).join("")}
          </div>
          <div class="generated-desc-meta" style="margin-top:22px">Implementation notes</div>
          <ul>
            ${project.bullets.map(b => `<li>${escapeHtml(b)}</li>`).join("")}
          </ul>
          ${project.url.startsWith("http") ? `<p style="margin-top:16px"><a href="${escapeHtml(project.url)}" target="_blank" rel="noreferrer">Open repository →</a></p>` : ""}
        </article>
      `).join("");

      const e = DATA.identity.education;
      complete.innerHTML = `
        <div class="complete-head">
          <div class="section-index">Full / records</div>
          <div>
            <h2>Full project record</h2>
            <p class="section-lead">This opens the full supporting material behind the compact portfolio view.</p>
          </div>
        </div>
        <div class="cards">
          <article class="card full">
            <div class="card-title-row">
              <div>
                <h3>${escapeHtml(e.school)}</h3>
                <div class="stack">${escapeHtml(e.degree)}</div>
              </div>
              <span class="tag">${escapeHtml(e.graduation)}</span>
            </div>
            <p>${escapeHtml(DATA.identity.stableLine)}</p>
          </article>
          ${projects}
        </div>
      `;
    }

    function showCompleteVersion(config) {
      const url = new URL(window.location.href);
      url.searchParams.set("complete", "1");
      window.history.replaceState(null, "", url.toString());
      renderCompleteVersion(config, true);
      document.getElementById("completeVersion").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function renderMain(config) {
      const renderers = {
        work: renderWork,
        experience: renderExperience,
        education: renderEducation,
        principles: renderPrinciples,
        skills: renderSkills,
        now: renderNow
      };
      const sections = config.sections.map((key, i) => renderers[key](config, i + 1)).join("");
      document.getElementById("main").innerHTML = sections + renderContact(config, config.sections.length + 1);
    }

    function renderReveal(config) {
      const reveal = document.getElementById("reveal");
      reveal.innerHTML = `
        <div class="kicker">${escapeHtml(config.revealCopy.kicker)}</div>
        <h2>${escapeHtml(config.revealCopy.headline)}</h2>
        <p style="margin-top:18px">${escapeHtml(config.revealCopy.body)}</p>
        <div class="reveal-grid">
          <div class="reveal-stat">
            <div class="reveal-stat-label">Reference code</div>
            <div class="reveal-stat-value">${escapeHtml(config.seed)}</div>
          </div>
        </div>
        <div class="reveal-actions">
          <button class="button" id="rollAgain">Refresh view</button>
          <button class="button secondary" id="copyVersion">Copy this view</button>
          <button class="button secondary" id="copySeed">Copy reference code</button>
          <button class="button secondary surrender" id="surrenderComplete">Show the full project record</button>
        </div>
      `;

      document.getElementById("rollAgain").addEventListener("click", rollAgain);
      document.getElementById("copyVersion").addEventListener("click", () => copyText(window.location.href, "View link copied."));
      document.getElementById("copySeed").addEventListener("click", () => copyText(config.seed, "Reference code copied."));
      document.getElementById("surrenderComplete").addEventListener("click", () => showCompleteVersion(config));
    }

    function copyText(text, message) {
      navigator.clipboard.writeText(text).then(() => showToast(message)).catch(() => {
        const input = document.createElement("input");
        input.value = text;
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
        showToast(message);
      });
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function rollAgain() {
      const overlay = document.getElementById("regenerating");
      overlay.classList.add("active");
      const lines = [...overlay.querySelectorAll(".regen-line")];
      lines.forEach((line, index) => {
        setTimeout(() => line.classList.add("active"), index * 210);
      });
      setTimeout(() => {
        const seed = createShortSeed();
        const url = new URL(window.location.href);
        url.searchParams.set("seed", seed);
        window.location.href = url.toString();
      }, 980);
    }

    function applyStyleGenome(styleGenome) {
      Object.entries(styleGenome.variables).forEach(([property, value]) => {
        document.body.style.setProperty(property, value);
      });
      document.documentElement.dataset.styleGenome = styleGenome.id;
    }

    function applyBodyClass(config) {
      document.body.className = [
        `theme-${config.colorTheme}`,
        `bg-${config.backgroundStyle}`,
        `style-${config.surfaceStyle}`,
        `shape-${config.shapeStyle}`,
        "style-generated",
        "layout-single"
      ].join(" ");
      applyStyleGenome(config.styleGenome);
    }

    function init() {
      const seed = getSeed();
      const config = generateConfig(seed);
      applyBodyClass(config);
      renderNav(config);
      renderHero(config);
      renderMain(config);
      renderReveal(config);
      renderCompleteVersion(config);
    }

    init();
  </script>
</body>
</html>
